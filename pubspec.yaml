name: liquid_refraction_surface
description: "A Flutter package for interactive liquid refraction surfaces with shader-driven ripples, content refraction, and reactive backgrounds."
version: 0.1.1
homepage: https://github.com/ZyaireXv/liquid_refraction_surface
repository: https://github.com/ZyaireXv/liquid_refraction_surface
issue_tracker: https://github.com/ZyaireXv/liquid_refraction_surface/issues

environment:
  sdk: ^3.11.1
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_shaders: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

topics:
  - flutter
  - shader
  - refraction
  - effects

flutter:
  shaders:
    - shaders/liquid_refraction.frag
